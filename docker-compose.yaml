version: '3.8'

services:
  backend:
    build: .
    container_name: asya-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: sqlite:////app/notes.db

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
